apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-admin-agent-config
  namespace: default
data:
  MCP_SERVER_URL: "http://k8s-mcp-server:8080"
  HOST: "0.0.0.0"
  PORT: "8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-admin-agent
  namespace: default
  labels:
    app: k8s-admin-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-admin-agent
  template:
    metadata:
      labels:
        app: k8s-admin-agent
    spec:
      containers:
        - name: k8s-admin-agent
          image: k8s-admin-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: k8s-admin-agent-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-admin-agent
  namespace: default
  labels:
    app: k8s-admin-agent
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: k8s-admin-agent

